spring:
  application:
    name: cheat
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/cheat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:38080}

app:
  security:
    token-expiration-seconds: 7200
  storage:
    upload-dir: storage/uploads
  model:
    bailian:
      api-key: ${BAILIAN_API_KEY:}
      base-url: ${BAILIAN_BASE_URL:}
      timeout-seconds: ${BAILIAN_TIMEOUT_SECONDS:60}
      max-tokens: ${BAILIAN_MAX_TOKENS:3000}
      temperature: ${BAILIAN_TEMPERATURE:0.2}
    ark:
      api-key: ${ARK_API_KEY:}
      base-url: ${ARK_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
      timeout-seconds: ${ARK_TIMEOUT_SECONDS:60}
      max-tokens: ${ARK_MAX_TOKENS:3000}
      temperature: ${ARK_TEMPERATURE:0.2}

logging:
  level:
    root: INFO
    com.cheat.exam: INFO
